<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Video Player</title>
  <style>
    /* Completely black background, no text, no margins */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* Container holding the video player */
    .player-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain; /* Keeps video proportion without stretching */
      background-color: #000000;
    }

    /* Loading Overlay Screen */
    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      pointer-events: none; /* Stops clicks from blocking the video scale */
      transition: opacity 0.4s ease;
    }

    /* Custom Animation Canvas Canvas box */
    #animationCanvas {
      display: block;
    }

    /* Standard loading spinner backup if no sprite strip is given */
    .default-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #333;
      border-top: 5px solid #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Hide items layout utility class */
    .hidden {
      opacity: 0 !important;
    }
  </style>
</head>
<body>

  <div class="player-container">
    <!-- The Video Element -->
    <video id="customVideo" controls autoplay muted></video>

    <!-- The Loading Overlay Screen -->
    <div id="loadingOverlay" class="loading-overlay">
      <div id="spinnerBackup" class="default-spinner"></div>
      <canvas id="animationCanvas" style="display: none;"></canvas>
    </div>
  </div>

  <script>
    // 1. Read parameters from the website browser URL bar
    const urlParams = new URLSearchParams(window.location.search);
    const videoUrl = urlParams.get('video');       // ?video=
    const stripUrl = urlParams.get('strip');       // &strip=
    const totalFrames = parseInt(urlParams.get('frames')) || 1; // &frames=
    const frameRate = parseInt(urlParams.get('fps')) || 24;     // &fps=

    const videoElement = document.getElementById('customVideo');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const spinnerBackup = document.getElementById('spinnerBackup');
    const canvas = document.getElementById('animationCanvas');
    const ctx = canvas.getContext('2d');

    // 2. Setup Video Source link if provided
    if (videoUrl) {
      videoElement.src = videoUrl;
    }

    // 3. Manage Loading overlay show/hide states automatically
    videoElement.addEventListener('waiting', () => {
      loadingOverlay.classList.remove('hidden');
    });

    videoElement.addEventListener('playing', () => {
      loadingOverlay.classList.add('hidden');
    });

    videoElement.addEventListener('canplay', () => {
      loadingOverlay.classList.add('hidden');
    });

    // 4. Custom Animation Strip Engine using standard HTML5 Canvas
    if (stripUrl && totalFrames > 1) {
      const img = new Image();
      img.src = stripUrl;

      img.onload = function() {
        // Hide backup spinner, activate custom canvas
        spinnerBackup.style.display = 'none';
        canvas.style.display = 'block';

        // Calculate size of a single box frame
        const frameWidth = img.width / totalFrames;
        const frameHeight = img.height;

        canvas.width = frameWidth;
        canvas.height = frameHeight;

        let currentFrame = 0;

        // Loop engine drawing frame sections sequentially
        setInterval(() => {
          ctx.clearRect(0, 0, frameWidth, frameHeight);
          
          // Draw targeted frame segment from horizontal sprite map
          ctx.drawImage(
            img, 
            currentFrame * frameWidth, 0, frameWidth, frameHeight, // Source clipping
            0, 0, frameWidth, frameHeight // Target canvas output
          );

          currentFrame = (currentFrame + 1) % totalFrames;
        }, 1000 / frameRate);
      };
    }
  </script>
</body>
</html>
