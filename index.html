<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Configurable Video Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      overflow: hidden;
      font-family: sans-serif;
      transition: background-color 0.3s ease;
    }

    .player-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background-color: #000000;
      transition: background-color 0.3s ease;
      z-index: 1;
    }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      pointer-events: auto; 
      transition: opacity 0.4s ease, background-color 0.3s ease;
      cursor: pointer;
    }

    #animationCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .default-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #333;
      border-top: 5px solid #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .hidden {
      opacity: 0 !important;
      pointer-events: none !important;
    }
  </style>
</head>
<body>

  <div class="player-container">
    <!-- OPTIMIZED: Strict attributes to override iOS video player overrides -->
    <video id="customVideo" controls playsinline webkit-playsinline></video>

    <div id="loadingOverlay" class="loading-overlay">
      <div id="spinnerBackup" class="default-spinner"></div>
      <canvas id="animationCanvas" style="display: none;"></canvas>
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('customVideo');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const spinnerBackup = document.getElementById('spinnerBackup');
    const canvas = document.getElementById('animationCanvas');
    const ctx = canvas.getContext('2d');

    let animationInterval = null;

    function hideOverlay() {
      loadingOverlay.classList.add('hidden');
      if (animationInterval) {
        clearInterval(animationInterval);
        animationInterval = null;
      }
    }

    // Force hide overlay when video state updates
    videoElement.addEventListener('playing', hideOverlay);
    videoElement.addEventListener('canplay', hideOverlay);
    videoElement.addEventListener('loadeddata', hideOverlay);

    // Manual click container to handle iPad autoplay block overrides
    loadingOverlay.addEventListener('click', () => {
      if (!videoElement.src) return; // Don't try to play if no source loaded
      videoElement.muted = true;
      videoElement.play().catch(err => console.log("Bypass fail:", err));
      hideOverlay();
    });

    function parseConfigFile(text) {
      const config = {};
      const lines = text.split('\n');
      
      lines.forEach(line => {
        if (line.includes('=')) {
          const index = line.indexOf('=');
          const key = line.substring(0, index).trim();
          const value = line.substring(index + 1).trim();
          if (key && value) {
            config[key] = value;
          }
        }
      });
      return config;
    }

    fetch('config.playr?cb=' + Date.now())
      .then(response => response.text())
      .then(text => {
        const settings = parseConfigFile(text);

        if (settings.background_color) {
          const color = settings.background_color;
          document.body.style.backgroundColor = color;
          videoElement.style.backgroundColor = color;
          loadingOverlay.style.backgroundColor = color;
        }

        if (settings.video_url) {
          videoElement.removeAttribute('src');
          videoElement.load();
          
          videoElement.src = settings.video_url;
          videoElement.load();
          
          videoElement.muted = true;
          videoElement.play().catch(err => {
            console.log("Autoplay blocked. Waiting for manual user tap interaction.");
          });
        }

        const stripUrl = settings.strip_image;
        const totalFrames = parseInt(settings.animation_frames) || 1;
        const frameRate = parseInt(settings.animation_fps) || 24;
        const customSize = parseInt(settings.animation_size);

        if (stripUrl && totalFrames > 1) {
          const img = new Image();
          img.src = stripUrl + '?cb=' + Date.now();

          img.onload = function() {
            spinnerBackup.style.display = 'none';
            canvas.style.display = 'block';

            if (img.width === 0 || img.height === 0) {
              console.error('Sprite image has invalid dimensions');
              return;
            }

            const frameWidth = img.width / totalFrames;
            const frameHeight = img.height;

            if (frameWidth <= 0 || !isFinite(frameWidth)) {
              console.error('Invalid frame width calculated');
              return;
            }

            if (customSize) {
              const aspectRatio = frameWidth / frameHeight;
              canvas.width = customSize;
              canvas.height = customSize / aspectRatio;
            } else {
              canvas.width = frameWidth;
              canvas.height = frameHeight;
            }

            let currentFrame = 0;
            animationInterval = setInterval(() => {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              ctx.drawImage(
                img, 
                currentFrame * frameWidth, 0, frameWidth, frameHeight,
                0, 0, canvas.width, canvas.height
              );
              currentFrame = (currentFrame + 1) % totalFrames;
            }, 1000 / frameRate);
          };

          img.onerror = function() {
            console.error('Failed to load sprite strip image:', stripUrl);
            // Keep default spinner visible as fallback
          };
        }
      })
      .catch(error => console.error('Error loading config:', error));
  </script>
</body>
</html>
