<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Configurable Video Player</title>
  <style>
    /* Default look before configuration settings load */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      overflow: hidden;
      font-family: sans-serif;
      transition: background-color 0.3s ease;
    }

    .player-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background-color: #000000;
      transition: background-color 0.3s ease;
    }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.4s ease, background-color 0.3s ease;
    }

    #animationCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .default-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #333;
      border-top: 5px solid #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .hidden {
      opacity: 0 !important;
    }
  </style>
</head>
<body>

  <div class="player-container">
    <video id="customVideo" controls autoplay muted></video>

    <div id="loadingOverlay" class="loading-overlay">
      <div id="spinnerBackup" class="default-spinner"></div>
      <canvas id="animationCanvas" style="display: none;"></canvas>
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('customVideo');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const spinnerBackup = document.getElementById('spinnerBackup');
    const canvas = document.getElementById('animationCanvas');
    const ctx = canvas.getContext('2d');

    // Video status control switches
    videoElement.addEventListener('waiting', () => loadingOverlay.classList.remove('hidden'));
    videoElement.addEventListener('playing', () => loadingOverlay.classList.add('hidden'));
    videoElement.addEventListener('canplay', () => loadingOverlay.classList.add('hidden'));

    // Helper engine to clean up and extract configuration text values
    function parseConfigFile(text) {
      const config = {};
      const lines = text.split('\n');
      lines.forEach(line => {
        const parts = line.split('=');
        if (parts.length === 2) {
          const key = parts[0].trim();
          const value = parts[1].trim();
          config[key] = value;
        }
      });
      return config;
    }

    // Read the config.playr file directly from your repository folder
    fetch('config.playr')
      .then(response => {
        if (!response.ok) {
          throw new Error('Could not find config.playr file');
        }
        return response.text();
      })
      .then(text => {
        const settings = parseConfigFile(text);

        // 1. Update colors across elements dynamically
        if (settings.background_color) {
          const color = settings.background_color;
          document.body.style.backgroundColor = color;
          videoElement.style.backgroundColor = color;
          loadingOverlay.style.backgroundColor = color;
        }

        // 2. Attach Video URL source
        if (settings.video_url) {
          videoElement.src = settings.video_url;
        }

        // 3. Build custom animation strip layouts if requested
        const stripUrl = settings.strip_image;
        const totalFrames = parseInt(settings.animation_frames) || 1;
        const frameRate = parseInt(settings.animation_fps) || 24;
        const customSize = parseInt(settings.animation_size);

        if (stripUrl && totalFrames > 1) {
          const img = new Image();
          img.src = stripUrl;

          img.onload = function() {
            spinnerBackup.style.display = 'none';
            canvas.style.display = 'block';

            const frameWidth = img.width / totalFrames;
            const frameHeight = img.height;

            if (customSize) {
              const aspectRatio = frameWidth / frameHeight;
              canvas.width = customSize;
              canvas.height = customSize / aspectRatio;
            } else {
              canvas.width = frameWidth;
              canvas.height = frameHeight;
            }

            let currentFrame = 0;
            setInterval(() => {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              ctx.drawImage(
                img, 
                currentFrame * frameWidth, 0, frameWidth, frameHeight,
                0, 0, canvas.width, canvas.height
              );
              currentFrame = (currentFrame + 1) % totalFrames;
            }, 1000 / frameRate);
          };
        }
      })
      .catch(error => console.error('Error loading custom layout rules:', error));
  </script>
</body>
</html>
