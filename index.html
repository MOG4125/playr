<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Configurable Video Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      overflow: hidden;
      font-family: sans-serif;
      transition: background-color 0.3s ease;
    }

    .player-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background-color: #000000;
      transition: background-color 0.3s ease;
      z-index: 1;
    }

    .dropbox-embed {
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
    }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      pointer-events: auto; 
      transition: opacity 0.4s ease, background-color 0.3s ease;
      cursor: pointer;
    }

    #animationCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .default-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #333;
      border-top: 5px solid #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .hidden {
      opacity: 0 !important;
      pointer-events: none !important;
    }

    .error-message {
      color: #ff4444;
      font-size: 14px;
      margin-top: 20px;
      text-align: center;
      padding: 0 20px;
      display: none;
      max-width: 80%;
    }

    .tap-to-play {
      color: #ffffff;
      font-size: 18px;
      margin-top: 15px;
      text-align: center;
      display: none;
    }

    .fallback-notice {
      color: #ffaa00;
      font-size: 12px;
      margin-top: 15px;
      text-align: center;
      display: none;
      max-width: 80%;
    }
  </style>
</head>
<body>

  <div class="player-container" id="playerContainer">
    <video id="customVideo" controls playsinline webkit-playsinline preload="auto" crossorigin="anonymous" style="display: none;"></video>
    <iframe id="dropboxFrame" class="dropbox-embed" style="display: none;" allow="autoplay"></iframe>

    <div id="loadingOverlay" class="loading-overlay">
      <div id="spinnerBackup" class="default-spinner"></div>
      <canvas id="animationCanvas" style="display: none;"></canvas>
      <div id="errorMessage" class="error-message"></div>
      <div id="tapToPlay" class="tap-to-play">Tap to play</div>
      <div id="fallbackNotice" class="fallback-notice"></div>
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('customVideo');
    const dropboxFrame = document.getElementById('dropboxFrame');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const spinnerBackup = document.getElementById('spinnerBackup');
    const canvas = document.getElementById('animationCanvas');
    const ctx = canvas.getContext('2d');
    const errorMessage = document.getElementById('errorMessage');
    const tapToPlay = document.getElementById('tapToPlay');
    const fallbackNotice = document.getElementById('fallbackNotice');

    let animationInterval = null;
    let configLoaded = false;
    let videoLoadFailed = false;
    let currentVideoUrl = '';
    let isDropbox = false;
    let useIframeFallback = false;
    let overlayStartTime = 0;
    let overlayMinDuration = 3000; // Default: 3 seconds, overridden by config
    let overlayHidePending = false;

    function showError(msg) {
      errorMessage.textContent = msg;
      errorMessage.style.display = 'block';
      spinnerBackup.style.display = 'none';
      canvas.style.display = 'none';
    }

    function hideOverlay() {
      const elapsed = Date.now() - overlayStartTime;
      const remaining = overlayMinDuration - elapsed;

      if (remaining > 0 && !overlayHidePending) {
        overlayHidePending = true;
        setTimeout(() => {
          overlayHidePending = false;
          doHideOverlay();
        }, remaining);
        return;
      }

      if (!overlayHidePending) {
        doHideOverlay();
      }
    }

    function doHideOverlay() {
      loadingOverlay.classList.add('hidden');
      if (animationInterval) {
        clearInterval(animationInterval);
        animationInterval = null;
      }
    }

    function showOverlay() {
      loadingOverlay.classList.remove('hidden');
      overlayStartTime = Date.now();
      overlayHidePending = false;
    }

    videoElement.addEventListener('playing', () => {
      hideOverlay();
      videoLoadFailed = false;
    });

    videoElement.addEventListener('canplay', () => {
      hideOverlay();
    });

    videoElement.addEventListener('loadeddata', () => {
      hideOverlay();
    });

    videoElement.addEventListener('error', (e) => {
      videoLoadFailed = true;
      const error = videoElement.error;
      let msg = 'Video failed to load';
      if (error) {
        switch(error.code) {
          case 1: msg = 'Video loading aborted'; break;
          case 2: msg = 'Network error - video URL is unreachable or blocked by CORS'; break;
          case 3: msg = 'Video decode error - file may be corrupted or wrong format'; break;
          case 4: 
            msg = 'Video format not supported - Dropbox blocks direct video streaming'; 
            if (isDropbox && !useIframeFallback) {
              useIframeFallback = true;
              setupDropboxIframe();
              return;
            }
            break;
        }
      }
      console.error('Video error:', msg, error);
      showError(msg + ' — Tap overlay to retry');
      tapToPlay.style.display = 'block';
      showOverlay();
    });

    videoElement.addEventListener('stalled', () => {
      console.warn('Video stalled');
      showOverlay();
    });

    videoElement.addEventListener('waiting', () => {
      console.warn('Video waiting for data');
      showOverlay();
    });

    function setupDropboxIframe() {
      videoElement.style.display = 'none';
      dropboxFrame.style.display = 'block';

      let embedUrl = currentVideoUrl.replace('raw=1', '');
      embedUrl = embedUrl.replace(/[?&]$/, '');

      dropboxFrame.src = embedUrl;

      fallbackNotice.textContent = 'Using Dropbox embed (limited controls)';
      fallbackNotice.style.display = 'block';

      setTimeout(() => {
        hideOverlay();
      }, 2000);
    }

    loadingOverlay.addEventListener('click', () => {
      if (useIframeFallback && isDropbox) {
        hideOverlay();
        return;
      }

      if (!videoElement.src) {
        showError('No video source configured');
        return;
      }

      if (videoLoadFailed) {
        videoElement.load();
        videoLoadFailed = false;
      }

      videoElement.muted = true;
      const playPromise = videoElement.play();
      if (playPromise !== undefined) {
        playPromise.then(() => {
          hideOverlay();
        }).catch(err => {
          console.log("Autoplay blocked:", err);
          tapToPlay.style.display = 'block';
          showError('Tap to play (autoplay blocked by browser)');
        });
      }
    });

    function parseConfigFile(text) {
      const config = {};
      const lines = text.split('\n');

      lines.forEach(line => {
        if (line.includes('=')) {
          const index = line.indexOf('=');
          const key = line.substring(0, index).trim();
          const value = line.substring(index + 1).trim();
          if (key && value) {
            config[key] = value;
          }
        }
      });
      return config;
    }

    function convertDropboxUrl(url) {
      if (!url) return url;

      if (url.includes('dropbox.com')) {
        isDropbox = true;
        url = url.replace(/[?&]dl=[01]/, '');
        url = url.replace(/[?&]raw=[01]/, '');
        url = url.replace(/[?&]$/, '');
        url += (url.includes('?') ? '&' : '?') + 'raw=1';
      }
      return url;
    }

    overlayStartTime = Date.now();

    fetch('config.playr?cb=' + Date.now())
      .then(response => {
        if (!response.ok) {
          throw new Error('Failed to load config: ' + response.status);
        }
        return response.text();
      })
      .then(text => {
        configLoaded = true;
        const settings = parseConfigFile(text);
        console.log('Config loaded:', settings);

        // Read overlay minimum duration from config (milliseconds)
        if (settings.overlay_min_duration) {
          const parsed = parseInt(settings.overlay_min_duration);
          if (!isNaN(parsed) && parsed >= 0) {
            overlayMinDuration = parsed;
            console.log('Overlay min duration set to:', overlayMinDuration, 'ms');
          }
        }

        if (settings.background_color) {
          const color = settings.background_color;
          document.body.style.backgroundColor = color;
          videoElement.style.backgroundColor = color;
          loadingOverlay.style.backgroundColor = color;
        }

        if (settings.video_url) {
          currentVideoUrl = convertDropboxUrl(settings.video_url);
          console.log('Loading video from:', currentVideoUrl, 'isDropbox:', isDropbox);

          if (isDropbox) {
            videoElement.style.display = 'block';
            dropboxFrame.style.display = 'none';
          }

          videoElement.pause();
          videoElement.removeAttribute('src');
          videoElement.load();

          videoElement.src = currentVideoUrl;
          videoElement.load();

          videoElement.muted = true;
          const playPromise = videoElement.play();
          if (playPromise !== undefined) {
            playPromise.catch(err => {
              console.log("Autoplay blocked:", err);
              tapToPlay.style.display = 'block';
            });
          }
        } else {
          showError('No video_url found in config.playr');
        }

        const stripUrl = settings.strip_image;
        const totalFrames = parseInt(settings.animation_frames) || 1;
        const frameRate = parseInt(settings.animation_fps) || 24;
        const customSize = parseInt(settings.animation_size);

        if (stripUrl && totalFrames > 1) {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.src = stripUrl + '?cb=' + Date.now();

          img.onload = function() {
            spinnerBackup.style.display = 'none';
            canvas.style.display = 'block';

            if (img.width === 0 || img.height === 0) {
              console.error('Sprite image has invalid dimensions');
              spinnerBackup.style.display = 'block';
              return;
            }

            const frameWidth = img.width / totalFrames;
            const frameHeight = img.height;

            if (frameWidth <= 0 || !isFinite(frameWidth)) {
              console.error('Invalid frame width calculated');
              spinnerBackup.style.display = 'block';
              return;
            }

            if (customSize) {
              const aspectRatio = frameWidth / frameHeight;
              canvas.width = customSize;
              canvas.height = customSize / aspectRatio;
            } else {
              canvas.width = frameWidth;
              canvas.height = frameHeight;
            }

            let currentFrame = 0;
            animationInterval = setInterval(() => {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              ctx.drawImage(
                img, 
                currentFrame * frameWidth, 0, frameWidth, frameHeight,
                0, 0, canvas.width, canvas.height
              );
              currentFrame = (currentFrame + 1) % totalFrames;
            }, 1000 / frameRate);
          };

          img.onerror = function() {
            console.error('Failed to load sprite strip image:', stripUrl);
          };
        }
      })
      .catch(error => {
        console.error('Config error:', error);
        showError('Failed to load config.playr: ' + error.message);
      });
  </script>
</body>
</html>
