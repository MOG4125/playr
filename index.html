<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Configurable Video Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      overflow: hidden;
      font-family: sans-serif;
      transition: background-color 0.3s ease;
    }

    .player-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background-color: #000000;
      transition: background-color 0.3s ease;
      z-index: 1;
    }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      pointer-events: auto; 
      transition: opacity 0.4s ease, background-color 0.3s ease;
      cursor: pointer;
    }

    #animationCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .default-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #333;
      border-top: 5px solid #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .hidden {
      opacity: 0 !important;
      pointer-events: none !important;
    }

    .error-message {
      color: #ff4444;
      font-size: 14px;
      margin-top: 20px;
      text-align: center;
      padding: 0 20px;
      display: none;
    }

    .tap-to-play {
      color: #ffffff;
      font-size: 18px;
      margin-top: 15px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

  <div class="player-container">
    <!-- OPTIMIZED: Strict attributes to override iOS video player overrides -->
    <video id="customVideo" controls playsinline webkit-playsinline preload="auto" crossorigin="anonymous"></video>

    <div id="loadingOverlay" class="loading-overlay">
      <div id="spinnerBackup" class="default-spinner"></div>
      <canvas id="animationCanvas" style="display: none;"></canvas>
      <div id="errorMessage" class="error-message"></div>
      <div id="tapToPlay" class="tap-to-play">Tap to play</div>
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('customVideo');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const spinnerBackup = document.getElementById('spinnerBackup');
    const canvas = document.getElementById('animationCanvas');
    const ctx = canvas.getContext('2d');
    const errorMessage = document.getElementById('errorMessage');
    const tapToPlay = document.getElementById('tapToPlay');

    let animationInterval = null;
    let configLoaded = false;
    let videoLoadFailed = false;

    function showError(msg) {
      errorMessage.textContent = msg;
      errorMessage.style.display = 'block';
      spinnerBackup.style.display = 'none';
      canvas.style.display = 'none';
    }

    function hideOverlay() {
      loadingOverlay.classList.add('hidden');
      if (animationInterval) {
        clearInterval(animationInterval);
        animationInterval = null;
      }
    }

    function showOverlay() {
      loadingOverlay.classList.remove('hidden');
    }

    // Video event listeners
    videoElement.addEventListener('playing', () => {
      hideOverlay();
      videoLoadFailed = false;
    });

    videoElement.addEventListener('canplay', () => {
      hideOverlay();
    });

    videoElement.addEventListener('loadeddata', () => {
      hideOverlay();
    });

    videoElement.addEventListener('error', (e) => {
      videoLoadFailed = true;
      const error = videoElement.error;
      let msg = 'Video failed to load';
      if (error) {
        switch(error.code) {
          case 1: msg = 'Video loading aborted'; break;
          case 2: msg = 'Network error - check video URL'; break;
          case 3: msg = 'Video decode error - file may be corrupted'; break;
          case 4: msg = 'Video format not supported'; break;
        }
      }
      console.error('Video error:', msg, error);
      showError(msg + ' — Tap overlay to retry');
      tapToPlay.style.display = 'block';
      showOverlay();
    });

    videoElement.addEventListener('stalled', () => {
      console.warn('Video stalled');
      showOverlay();
    });

    videoElement.addEventListener('waiting', () => {
      console.warn('Video waiting for data');
      showOverlay();
    });

    // Manual click container to handle iPad autoplay block overrides
    loadingOverlay.addEventListener('click', () => {
      if (!videoElement.src) {
        showError('No video source configured');
        return;
      }

      if (videoLoadFailed) {
        // Retry loading
        videoElement.load();
        videoLoadFailed = false;
      }

      videoElement.muted = true;
      const playPromise = videoElement.play();
      if (playPromise !== undefined) {
        playPromise.then(() => {
          hideOverlay();
        }).catch(err => {
          console.log("Autoplay blocked or playback failed:", err);
          tapToPlay.style.display = 'block';
          showError('Tap to play (autoplay blocked)');
        });
      }
    });

    function parseConfigFile(text) {
      const config = {};
      const lines = text.split('\n');

      lines.forEach(line => {
        if (line.includes('=')) {
          const index = line.indexOf('=');
          const key = line.substring(0, index).trim();
          const value = line.substring(index + 1).trim();
          if (key && value) {
            config[key] = value;
          }
        }
      });
      return config;
    }

    function convertDropboxUrl(url) {
      // Convert Dropbox shared links to direct download links
      if (!url) return url;

      // Replace dl=0 with dl=1 for direct download
      if (url.includes('dropbox.com')) {
        url = url.replace(/[?&]dl=0/, '?dl=1');
        if (!url.includes('dl=')) {
          url += (url.includes('?') ? '&' : '?') + 'dl=1';
        }
      }
      return url;
    }

    fetch('config.playr?cb=' + Date.now())
      .then(response => {
        if (!response.ok) {
          throw new Error('Failed to load config: ' + response.status);
        }
        return response.text();
      })
      .then(text => {
        configLoaded = true;
        const settings = parseConfigFile(text);
        console.log('Config loaded:', settings);

        if (settings.background_color) {
          const color = settings.background_color;
          document.body.style.backgroundColor = color;
          videoElement.style.backgroundColor = color;
          loadingOverlay.style.backgroundColor = color;
        }

        if (settings.video_url) {
          const videoUrl = convertDropboxUrl(settings.video_url);
          console.log('Loading video from:', videoUrl);

          // Reset video element completely
          videoElement.pause();
          videoElement.removeAttribute('src');
          videoElement.load();

          // Set new source
          videoElement.src = videoUrl;
          videoElement.load();

          // Try autoplay muted
          videoElement.muted = true;
          const playPromise = videoElement.play();
          if (playPromise !== undefined) {
            playPromise.catch(err => {
              console.log("Autoplay blocked. Waiting for manual user interaction.", err);
              tapToPlay.style.display = 'block';
            });
          }
        } else {
          showError('No video_url in config');
        }

        // Load sprite animation
        const stripUrl = settings.strip_image;
        const totalFrames = parseInt(settings.animation_frames) || 1;
        const frameRate = parseInt(settings.animation_fps) || 24;
        const customSize = parseInt(settings.animation_size);

        if (stripUrl && totalFrames > 1) {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.src = stripUrl + '?cb=' + Date.now();

          img.onload = function() {
            spinnerBackup.style.display = 'none';
            canvas.style.display = 'block';

            if (img.width === 0 || img.height === 0) {
              console.error('Sprite image has invalid dimensions');
              spinnerBackup.style.display = 'block';
              return;
            }

            const frameWidth = img.width / totalFrames;
            const frameHeight = img.height;

            if (frameWidth <= 0 || !isFinite(frameWidth)) {
              console.error('Invalid frame width calculated');
              spinnerBackup.style.display = 'block';
              return;
            }

            if (customSize) {
              const aspectRatio = frameWidth / frameHeight;
              canvas.width = customSize;
              canvas.height = customSize / aspectRatio;
            } else {
              canvas.width = frameWidth;
              canvas.height = frameHeight;
            }

            let currentFrame = 0;
            animationInterval = setInterval(() => {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              ctx.drawImage(
                img, 
                currentFrame * frameWidth, 0, frameWidth, frameHeight,
                0, 0, canvas.width, canvas.height
              );
              currentFrame = (currentFrame + 1) % totalFrames;
            }, 1000 / frameRate);
          };

          img.onerror = function() {
            console.error('Failed to load sprite strip image:', stripUrl);
            // Keep default spinner visible as fallback
          };
        }
      })
      .catch(error => {
        console.error('Config error:', error);
        showError('Failed to load config: ' + error.message);
      });
  </script>
</body>
</html>
